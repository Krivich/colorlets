<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Назови цвет</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: #f8f9fa; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: hidden; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- ЭКРАН СТАРТА / ДИАГНОСТИКИ --- */
        #start-screen {
            position: absolute; inset: 0; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #f8f9fa; padding: 20px; text-align: center;
        }
        #start-screen h1 { font-size: 2.2rem; margin-bottom: 15px; color: #333; }

        .diag-list { 
            list-style: none; text-align: left; 
            margin: 20px 0; font-size: 1.1rem; line-height: 2.2;
            opacity: 0.3; transition: opacity 0.3s;
        }
        .diag-list.active { opacity: 1; }
        .diag-list li::before { content: '⏳ '; }
        .diag-list li.ok::before { content: '✅ '; }
        .diag-list li.fail::before { content: '❌ '; }
        .diag-list li.warn::before { content: '⚠️ '; }
        .diag-list li.pending { color: #bbb; }

        #action-btn {
            padding: 18px 50px; font-size: 1.6rem;
            background: #2196F3; color: white; border: none;
            border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(33,150,243,0.4);
            transition: all 0.3s; min-width: 280px;
        }
        #action-btn:active { transform: scale(0.95); }
        #action-btn.checking { background: #FF9800; cursor: wait; }
        #action-btn.ready { background: #4caf50; animation: pulse-btn 2s infinite; }
        #action-btn.error { background: #f44336; }
        @keyframes pulse-btn { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

        .diag-hint {
            margin-top: 15px; font-size: 0.95rem; color: #666;
            max-width: 90%; line-height: 1.5; min-height: 40px;
        }

        /* --- ИГРОВОЙ ЭКРАН --- */
        #game-screen { display:none; flex-direction:column; align-items:center; width:100%; }
        #color-name {
            font-size: 3rem; font-weight: 800;
            margin-bottom: 30px; text-align: center; min-height: 60px;
        }
        #color-card {
            width: 70vw; height: 70vw; max-width: 350px; max-height: 350px;
            border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: all 0.4s ease;
        }
        #color-card.correct { animation: success-pop 0.7s ease; box-shadow: 0 0 40px rgba(76,175,80,0.7); }
        @keyframes success-pop {
            0%{transform:scale(1)} 40%{transform:scale(1.15) rotate(3deg)}
            70%{transform:scale(0.95) rotate(-2deg)} 100%{transform:scale(1) rotate(0)}
        }

        #mic-indicator {
            margin-top: 30px; width: 60px; height: 60px;
            border-radius: 50%; background: #e0e0e0;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; transition: all 0.3s;
        }
        #mic-indicator.alive {
            background: #c8e6c9;
            animation: mic-alive 1s infinite;
        }
        #mic-indicator.listening {
            background: #ffcdd2;
            animation: mic-listen 1.5s infinite;
        }
        @keyframes mic-alive {
            0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(76,175,80,0.5); }
            50% { transform: scale(1.12); box-shadow: 0 0 0 12px rgba(76,175,80,0); }
        }
        @keyframes mic-listen {
            0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244,67,54,0.5); }
            50% { transform: scale(1.12); box-shadow: 0 0 0 12px rgba(244,67,54,0); }
        }
        
        #status-text {
            margin-top: 10px; font-size: 0.9rem; color: #888; min-height: 20px;
        }
        #heard { margin-top: 15px; font-size: 1rem; color: #999; min-height: 24px; text-align: center; }

        /* --- ПОБЕДА --- */
        #win-screen {
            display:none; position:absolute; inset:0; z-index:10;
            flex-direction:column; align-items:center; justify-content:center;
            background:#f8f9fa;
        }
        #win-screen h1 { font-size:3rem; color:#4caf50; margin-bottom:10px; }
        #win-screen p { font-size:1.5rem; color:#666; margin-bottom:30px; }
        .emoji-rain { position:fixed; font-size:2.5rem; animation:fall 3s linear forwards; z-index:5; }
        @keyframes fall { to { top:110vh; transform:rotate(360deg); } }
    </style>
</head>
<body>

<!-- СТАРТ + ДИАГНОСТИКА -->
<div id="start-screen">
    <h1>🎤 Назови цвет</h1>
    <ul class="diag-list" id="diag-list">
        <li id="d-api" class="pending">API распознавания речи</li>
        <li id="d-mic" class="pending">Доступ к микрофону</li>
        <li id="d-audio" class="pending">Аудиопоток (звук идёт)</li>
    </ul>
    <button id="action-btn" onclick="runDiagnostics()">🔍 Проверить микрофон</button>
    <div class="diag-hint" id="diag-hint">Нажми кнопку выше — браузер спросит разрешение</div>
</div>

<!-- ИГРА -->
<div id="game-screen">
    <div id="color-name"></div>
    <div id="color-card"></div>
    <div id="mic-indicator">🎤</div>
    <div id="status-text">Ожидание...</div>
    <div id="heard"></div>
</div>

<!-- ПОБЕДА -->
<div id="win-screen">
    <h1>🎉 Молодец!</h1>
    <p>Ты назвала все цвета!</p>
    <button onclick="location.reload()" style="padding:18px 50px;font-size:1.6rem;background:#4caf50;color:white;border:none;border-radius:50px;cursor:pointer;">Ещё раз</button>
</div>

<script>
// ==========================================
// КОНФИГУРАЦИЯ ЦВЕТОВ
// ==========================================
const COLORS = [
    { name:"Красный",   hex:"#E53935", v:['красн','касный','красньй','крсный'] },
    { name:"Синий",     hex:"#1E88E5", v:['син','сипий','синьй','снний'] },
    { name:"Зеленый",   hex:"#43A047", v:['зелён','зелёный','зелный','зелёньй'] },
    { name:"Желтый",    hex:"#FFD600", v:['жёлт','жёлтый','желтый','жолтый'] },
    { name:"Оранжевый", hex:"#FB8C00", v:['оранж','оранжевый','орнжевый'] },
    { name:"Фиолетовый",hex:"#8E24AA", v:['фиолет','фиолетовый','фиолетов'] },
    { name:"Черный",    hex:"#263238", v:['чёрн','чёрный','черный','чрный'] },
    { name:"Белый",     hex:"#F5F5F5", v:['бел','белый','белй'] },
    { name:"Розовый",   hex:"#EC407A", v:['розов','розовый','розвый'] }
];

let currentIdx = 0, isProcessing = false, found = new Set();
let recognition = null, audioCtx = null, analyser = null, micStream = null;
let aliveCheckInterval = null;
let isRecognizing = false; // Флаг состояния движка
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function log(msg, type='info') {
    const styles = {
        info: 'color: #2196F3',
        success: 'color: #4caf50; font-weight: bold',
        warn: 'color: #FF9800',
        error: 'color: #f44336'
    };
    console.log(`%c[GAME] ${msg}`, styles[type] || styles.info);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ==========================================
// ДИАГНОСТИКА
// ==========================================
async function runDiagnostics() {
    const btn = document.getElementById('action-btn');
    const hint = document.getElementById('diag-hint');
    const list = document.getElementById('diag-list');
    
    btn.classList.add('checking');
    btn.textContent = 'Проверяю...';
    btn.disabled = true;
    list.classList.add('active');
    hint.textContent = '';
    log('Запуск диагностики...');

    let passed = 0;
    function mark(id, status, msg) {
        document.getElementById(id).className = status;
        if (status === 'ok') passed++;
        if (msg) hint.textContent = msg;
    }

    await sleep(300);

    // 1. API
    if (!SpeechRecognition) {
        mark('d-api', 'fail');
        log('API распознавания не найдено', 'error');
        finishDiag(0, 'Браузер не поддерживает распознавание. Нужен Chrome или Edge.');
        return;
    }
    mark('d-api', 'ok');
    log('API распознавания доступен');
    await sleep(200);

    // 2. Микрофон
    try {
        log('Запрос доступа к микрофону...');
        micStream = await navigator.mediaDevices.getUserMedia({ 
            audio: { echoCancellation: true, noiseSuppression: true } 
        });
        mark('d-mic', 'ok');
        log('Доступ к микрофону получен', 'success');
    } catch (e) {
        mark('d-mic', 'fail');
        log(`Ошибка микрофона: ${e.name}`, 'error');
        const messages = {
            'NotAllowedError': 'Доступ запрещён. Разрешите микрофон в браузере.',
            'NotFoundError': 'Микрофон не найден.',
            'NotReadableError': 'Микрофон занят другим приложением.',
            'SecurityError': 'Домен блокирует микрофон. Используйте HTTPS или localhost.'
        };
        finishDiag(passed, messages[e.name] || `Ошибка: ${e.message}`);
        return;
    }
    await sleep(200);

    // 3. Аудиопоток
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        
        const source = audioCtx.createMediaStreamSource(micStream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        let hasSignal = false;
        const checkStart = Date.now();
        
        await new Promise(resolve => {
            const iv = setInterval(() => {
                analyser.getByteFrequencyData(dataArray);
                const avg = dataArray.reduce((a,b) => a+b, 0) / dataArray.length;
                if (avg > 5) hasSignal = true;
                if (Date.now() - checkStart > 800) { clearInterval(iv); resolve(); }
            }, 50);
        });
        
        mark('d-audio', hasSignal ? 'ok' : 'warn', 
             hasSignal ? '' : 'Микрофон тихий. Говорите громче.');
        log(hasSignal ? 'Аудиосигнал есть' : 'Аудиосигнал слабый', hasSignal ? 'success' : 'warn');
    } catch(e) {
        mark('d-audio', 'warn', 'Не удалось проверить поток.');
        log('Ошибка анализа потока', 'error');
    }

    finishDiag(passed >= 2 ? 3 : passed);
}

function finishDiag(passed) {
    const btn = document.getElementById('action-btn');
    const hint = document.getElementById('diag-hint');
    
    btn.disabled = false;
    btn.classList.remove('checking');

    if (passed >= 2) {
        btn.textContent = '▶ Играть';
        btn.classList.add('ready');
        btn.onclick = startGame;
        hint.textContent = 'Всё готово! Нажми «Играть».';
        log('Диагностика пройдена успешно', 'success');
    } else {
        btn.textContent = '🔄 Попробовать снова';
        btn.classList.add('error');
        btn.onclick = () => location.reload();
        hint.textContent = 'Что-то пошло не так. Обновите страницу.';
    }
}

// ==========================================
// МОНИТОРИНГ МИКРОФОНА (ВИЗУАЛИЗАЦИЯ)
// ==========================================
function startAliveMonitor() {
    const mic = document.getElementById('mic-indicator');
    const status = document.getElementById('status-text');
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    
    aliveCheckInterval = setInterval(() => {
        if (!analyser) return;
        analyser.getByteFrequencyData(dataArray);
        const avg = dataArray.reduce((a,b) => a+b, 0) / dataArray.length;
        
        if (avg > 8 && !isProcessing) {
            mic.classList.add('alive');
            mic.classList.remove('listening');
            status.textContent = 'Слышу звук...';
        } else {
            mic.classList.remove('alive');
        }
    }, 100);
}

function stopAliveMonitor() {
    clearInterval(aliveCheckInterval);
    document.getElementById('mic-indicator').classList.remove('alive', 'listening');
    document.getElementById('status-text').textContent = '';
}

// ==========================================
// ЛОГИКА ИГРЫ
// ==========================================
function startGame() {
    found.clear(); currentIdx = 0;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    
    initRecognition();
    startAliveMonitor();
    showNextColor();
}

function initRecognition() {
    recognition = new SpeechRecognition();
    recognition.lang = 'ru-RU';
    recognition.continuous = false; // Стабильнее для мобильных
    recognition.interimResults = false;
    recognition.maxAlternatives = 5;

    recognition.onstart = () => {
        isRecognizing = true;
        document.getElementById('mic-indicator').classList.add('listening');
        document.getElementById('status-text').textContent = 'Слушаю...';
        log('Распознавание запущено');
    };

    recognition.onresult = (e) => {
        if (isProcessing) return;
        const last = e.results[e.results.length - 1];
        if (!last.isFinal) return;
        
        const transcript = last[0].transcript.toLowerCase().trim();
        const confidence = Math.round(last[0].confidence * 100);
        
        log(`Распознано: "${transcript}" (уверенность: ${confidence}%)`);
        document.getElementById('heard').textContent = `Услышала: «${transcript}»`;
        
        if (checkMatch(transcript)) {
            log(`СОВПАДЕНИЕ! Правильный ответ.`, 'success');
            handleCorrect();
        } else {
            log(`Не совпало с целевым цветом.`);
        }
    };

    recognition.onerror = (e) => {
        if (e.error === 'no-speech') {
            log('Тишина (no-speech). Перезапуск...', 'warn');
        } else {
            log(`Ошибка распознавания: ${e.error}`, 'error');
            document.getElementById('status-text').textContent = 'Ошибка: ' + e.error;
        }
        isRecognizing = false;
        // Безопасный перезапуск с задержкой
        setTimeout(restartListening, 500);
    };
    
    recognition.onend = () => {
        isRecognizing = false;
        document.getElementById('mic-indicator').classList.remove('listening');
        log('Сессия распознавания завершена (onend)');
        
        if (!isProcessing && document.getElementById('game-screen').style.display === 'flex') {
            log('Попытка перезапуска...');
            setTimeout(restartListening, 300);
        }
    };
    
    try { recognition.start(); } catch(e) {
        log(`Не удалось запустить: ${e.message}`, 'error');
    }
}

function restartListening() {
    if (isRecognizing) {
        log('Пропуск запуска: уже слушает');
        return;
    }
    if (isProcessing) {
        log('Пропуск запуска: обработка ответа');
        return;
    }
    if (document.getElementById('game-screen').style.display === 'none') return;

    try { 
        recognition.start(); 
        log('Распознавание перезапущено');
    } catch(e) {
        log(`Ошибка перезапуска: ${e.message}`, 'error');
        // Если поймали InvalidState, пробуем ещё раз через секунду
        setTimeout(() => {
            if (!isRecognizing) try { recognition.start(); } catch(err) {}
        }, 1000);
    }
}

function checkMatch(text) {
    const c = COLORS[currentIdx];
    // Точное совпадение
    if (text.includes(c.name.toLowerCase())) return true;
    // Совпадение по вариантам (детский лепет)
    return c.v.some(v => text.includes(v));
}

function handleCorrect() {
    isProcessing = true;
    stopAliveMonitor();
    document.getElementById('mic-indicator').classList.remove('listening');
    document.getElementById('color-card').classList.add('correct');
    
    const praise = ["Молодец!", "Правильно!", "Умница!", "Супер!"][Math.floor(Math.random()*4)];
    speak(`${praise} Это ${COLORS[currentIdx].name}!`);
    found.add(currentIdx);

    setTimeout(() => {
        document.getElementById('color-card').classList.remove('correct');
        document.getElementById('heard').textContent = '';
        
        if (found.size >= COLORS.length) { 
            showWin(); 
        } else { 
            showNextColor(); 
            startAliveMonitor(); 
        }
        
        isProcessing = false;
        restartListening();
    }, 1500);
}

function showNextColor() {
    const available = [];
    COLORS.forEach((_, i) => { if (!found.has(i)) available.push(i); });
    currentIdx = available[Math.floor(Math.random() * available.length)];
    
    const c = COLORS[currentIdx];
    const nameEl = document.getElementById('color-name');
    nameEl.textContent = c.name;
    nameEl.style.color = ['Белый','Желтый'].includes(c.name) ? '#333' : c.hex;
    document.getElementById('color-card').style.backgroundColor = c.hex;
    
    log(`Новое задание: ${c.name}`);
    speak(`Назови ${c.name}`);
}

function speak(text) {
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ru-RU'; u.rate = 0.85; u.pitch = 1.1;
    speechSynthesis.speak(u);
}

function showWin() {
    stopAliveMonitor();
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('win-screen').style.display = 'flex';
    speak('Поздравляю! Ты назвала все цвета!');
    
    const emojis = ['⭐','🎈','🎉','🍭','🌈','💖'];
    for (let i = 0; i < 30; i++) {
        setTimeout(() => {
            const el = document.createElement('div');
            el.className = 'emoji-rain';
            el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
            el.style.left = Math.random()*100+'vw';
            el.style.top = '-60px';
            el.style.animationDuration = (2+Math.random()*2)+'s';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }, i*150);
    }
}
</script>
</body>
</html>
