<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Назови цвет</title>
    <style>
        :root { --bg: #f8f9fa; --text: #333; --blue: #2196F3; --green: #4caf50; --red: #f44336; --orange: #FF9800; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; color: var(--text); }
        
        /* Экраны */
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; transition: opacity 0.3s; }
        .hidden { display: none !important; }
        
        h1 { font-size: 2rem; margin-bottom: 15px; }
        
        /* Диагностика список */
        .diag-list { list-style: none; text-align: left; margin: 15px 0; font-size: 1rem; line-height: 2; width: 100%; max-width: 320px; }
        .diag-list li { padding-left: 30px; position: relative; opacity: 0.4; transition: all 0.3s; }
        .diag-list.active li { opacity: 1; }
        .diag-list li::before { content: '⏳'; position: absolute; left: 0; }
        .diag-list li.ok::before { content: '✅'; }
        .diag-list li.fail::before { content: '❌'; }
        .diag-list li.checking { font-weight: bold; color: var(--blue); }
        
        /* Кнопка */
        #action-btn { 
            padding: 18px 40px; font-size: 1.4rem; background: var(--blue); color: white; 
            border: none; border-radius: 50px; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(33,150,243,0.3); 
            transition: all 0.2s; min-width: 260px; margin-top: 10px;
            touch-action: manipulation;
        }
        #action-btn:active { transform: scale(0.96); }
        #action-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
        #action-btn.state-checking { background: var(--orange); }
        #action-btn.state-error { background: var(--red); }
        
        .hint { margin-top: 15px; font-size: 0.9rem; color: #666; min-height: 40px; max-width: 90%; line-height: 1.4; }

        /* Игровой экран */
        #color-card { 
            width: 65vw; height: 65vw; max-width: 320px; max-height: 320px; 
            border-radius: 25px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); 
            margin: 20px 0; transition: transform 0.3s;
        }
        #color-card.correct { animation: pop 0.6s ease; box-shadow: 0 0 30px rgba(76,175,80,0.6); }
        @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.1) rotate(2deg)} 100%{transform:scale(1)} }
        
        .indicators { display: flex; gap: 15px; align-items: center; margin-top: 10px; }
        .mic-icon { width: 50px; height: 50px; border-radius: 50%; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: all 0.3s; }
        .mic-icon.active { background: #ffcdd2; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(244,67,54,0.4)} 50%{box-shadow:0 0 0 10px rgba(244,67,54,0)} }
        
        .vol-bar { width: 8px; height: 50px; background: #ddd; border-radius: 4px; overflow: hidden; position: relative; }
        .vol-fill { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: var(--green); transition: height 0.08s linear; }

        /* ЛОГИ - ГЛАВНОЕ УЛУЧШЕНИЕ */
        #log-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 35vh; background: #1e1e1e; color: #ddd;
            font-family: 'Courier New', monospace; font-size: 11px; line-height: 1.4;
            padding: 10px; overflow-y: auto; z-index: 100;
            border-top: 2px solid #333;
            -webkit-overflow-scrolling: touch;
        }
        .log-line { margin-bottom: 3px; word-break: break-word; border-bottom: 1px solid #2a2a2a; padding-bottom: 2px; }
        .log-time { color: #666; margin-right: 6px; }
        .log-info { color: #81d4fa; }
        .log-ok { color: #a5d6a7; font-weight: bold; }
        .log-warn { color: #ffe082; }
        .log-err { color: #ef9a9a; font-weight: bold; }
        .log-stt { color: #ce93d8; }

        /* Победа */
        #win-screen h1 { font-size: 2.5rem; color: var(--green); }
        .emoji-rain { position: fixed; font-size: 2rem; animation: fall 3s linear forwards; pointer-events: none; z-index: 50; }
        @keyframes fall { to { top: 110vh; transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- СТАРТОВЫЙ ЭКРАН -->
<div id="start-screen" class="screen">
    <h1>🎨 Назови цвет</h1>
    <ul class="diag-list" id="diag-list">
        <li id="d-api">Браузер поддерживает API</li>
        <li id="d-secure">Безопасное соединение (HTTPS)</li>
        <li id="d-mic">Доступ к микрофону</li>
        <li id="d-stt">Распознавание речи (Google)</li>
    </ul>
    <button id="action-btn" onclick="runDiagnostics()">▶ Запустить проверку</button>
    <div class="hint" id="diag-hint">Нажмите кнопку и разрешите доступ к микрофону.</div>
</div>

<!-- ИГРОВОЙ ЭКРАН -->
<div id="game-screen" class="screen hidden">
    <div style="font-size:1.8rem; font-weight:800; min-height:50px;" id="instruction">Какой это цвет?</div>
    <div id="color-card"></div>
    <div class="indicators">
        <div class="vol-bar"><div class="vol-fill" id="vol-fill"></div></div>
        <div class="mic-icon" id="mic-icon">🎤</div>
    </div>
</div>

<!-- ЭКРАН ПОБЕДЫ -->
<div id="win-screen" class="screen hidden">
    <h1>🎉 Молодец!</h1>
    <p style="margin:10px 0 25px; font-size:1.2rem;">Все цвета названы верно!</p>
    <button onclick="location.reload()" style="padding:16px 40px;font-size:1.3rem;background:var(--green);color:white;border:none;border-radius:50px;cursor:pointer;">Играть ещё раз</button>
</div>

<!-- ПАНЕЛЬ ЛОГОВ (ВСЕГДА ВИДИМА) -->
<div id="log-panel"></div>

<script>
/**
 * ЦВЕТА И СОСТОЯНИЕ
 */
const COLORS = [
    { name:"красный", hex:"#E53935" }, { name:"синий", hex:"#1E88E5" },
    { name:"зеленый", hex:"#43A047" }, { name:"желтый", hex:"#FFD600" },
    { name:"оранжевый", hex:"#FB8C00" }, { name:"фиолетовый", hex:"#8E24AA" },
    { name:"черный", hex:"#263238" }, { name:"белый", hex:"#F5F5F5" },
    { name:"розовый", hex:"#EC407A" }
];

let state = {
    idx: 0,
    found: new Set(),
    processing: false,
    audioCtx: null,
    micStream: null,
    analyser: null,
    recognition: null,
    volInterval: null
};

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

/**
 * ЛОГИРОВАНИЕ (УЛУЧШЕННОЕ)
 */
function log(msg, type = 'info') {
    const panel = document.getElementById('log-panel');
    const line = document.createElement('div');
    line.className = 'log-line';
    
    const time = new Date().toLocaleTimeString('ru-RU', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
    const ms = String(new Date().getMilliseconds()).padStart(3,'0');
    
    let prefix = '';
    switch(type) {
        case 'ok': prefix = '✅ '; break;
        case 'err': prefix = '❌ '; break;
        case 'warn': prefix = '⚠️ '; break;
        case 'stt': prefix = '🗣 '; break;
    }
    
    line.innerHTML = `<span class="log-time">[${time}.${ms}]</span><span class="log-${type}">${prefix}${msg}</span>`;
    panel.appendChild(line);
    // Автопрокрутка вниз
    panel.scrollTop = panel.scrollHeight;
}

/**
 * ДИАГНОСТИКА
 */
async function runDiagnostics() {
    const btn = document.getElementById('action-btn');
    const hint = document.getElementById('diag-hint');
    const listItems = document.querySelectorAll('.diag-list li');
    
    // Активируем список
    document.getElementById('diag-list').classList.add('active');
    btn.className = 'state-checking';
    btn.textContent = 'Проверка...';
    btn.disabled = true;
    
    log('=== НАЧАЛО ДИАГНОСТИКИ ===', 'info');

    // 1. API
    if (!SR) {
        setDiag('d-api', false);
        log('SpeechRecognition API не поддерживается этим браузером', 'err');
        showFail(btn, hint, 'Этот браузер не поддерживает распознавание речи. Используйте Chrome.');
        return;
    }
    setDiag('d-api', true);
    log('SpeechRecognition API доступен', 'ok');

    // 2. HTTPS / Secure Context
    const isSecure = window.isSecureContext || location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    if (!isSecure) {
        setDiag('d-secure', false);
        log(`Небезопасный контекст! protocol=${location.protocol}, host=${location.hostname}`, 'err');
        showFail(btn, hint, 'Нужен HTTPS! Микрофон не работает на обычном HTTP.');
        return;
    }
    setDiag('d-secure', true);
    log('Безопасный контекст (HTTPS)', 'ok');

    // 3. Микрофон
    setChecking('d-mic');
    hint.textContent = 'Разрешите доступ к микрофону...';
    log('Запрос доступа к микрофону...', 'info');
    
    try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            throw new Error('navigator.mediaDevices недоступен');
        }
        state.micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
        
        // Создаем AudioContext СРАЗУ после получения потока (по user gesture)
        state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (state.audioCtx.state === 'suspended') {
            await state.audioCtx.resume();
            log('AudioContext resumed', 'warn');
        }
        log(`AudioContext state: ${state.audioCtx.state}, sampleRate: ${state.audioCtx.sampleRate}`, 'ok');
        
        setDiag('d-mic', true);
        log(`Микрофон получен: tracks=${state.micStream.getAudioTracks().length}`, 'ok');
        
        const track = state.micStream.getAudioTracks()[0];
        if (track) {
            const settings = track.getSettings();
            log(`Track settings: ${JSON.stringify(settings)}`, 'info');
        }
    } catch (e) {
        setDiag('d-mic', false);
        log(`Ошибка микрофона: name=${e.name}, message=${e.message}`, 'err');
        
        let msg = 'Не удалось получить доступ к микрофону.';
        if (e.name === 'NotAllowedError') msg = 'Доступ к микрофону ЗАПРЕЩЁН. Разрешите в настройках браузера.';
        else if (e.name === 'NotFoundError') msg = 'Микрофон не найден устройством.';
        else if (e.name === 'NotReadableError') msg = 'Микрофон занят другим приложением.';
        else if (e.message.includes('mediaDevices')) msg = 'API микрофона недоступен. Нужен HTTPS или Chrome.';
        
        showFail(btn, hint, msg);
        return;
    }

    // 4. STT Тест
    setChecking('d-stt');
    hint.textContent = '🗣 Скажите любой цвет (например: "КРАСНЫЙ")';
    log('Запуск тестового распознавания...', 'info');
    
    const testRec = new SR();
    testRec.lang = 'ru-RU';
    testRec.interimResults = false;
    testRec.maxAlternatives = 3;
    
    let sttOk = false;
    let testTimer = null;
    
    testRec.onstart = () => log('STT onstart: запись началась', 'stt');
    
    testRec.onaudiostart = () => log('STT onaudiostart: аудио поток пошёл', 'stt');
    
    testRec.onspeechstart = () => log('STT onspeechstart: обнаружена речь!', 'stt');
    
    testRec.onresult = (e) => {
        sttOk = true;
        clearTimeout(testTimer);
        const results = Array.from(e.results[0]).map(r => `${r.transcript} (${(r.confidence*100).toFixed(0)}%)`);
        log(`STT результат: ${results.join(' | ')}`, 'ok');
        testRec.stop();
    };
    
    testRec.onerror = (e) => {
        log(`STT ошибка: error="${e.error}", message="${e.message || ''}"`, 'err');
        // Не останавливаем сразу, ждем onend
    };
    
    testRec.onend = () => {
        log(`STT onend: sttOk=${sttOk}`, sttOk ? 'ok' : 'warn');
        
        if (sttOk) {
            setDiag('d-stt', true);
            hint.textContent = '✅ Всё готово! Запускаю игру...';
            btn.className = '';
            btn.style.background = 'var(--green)';
            btn.textContent = '✓ Готово';
            setTimeout(startGame, 800);
        } else {
            setDiag('d-stt', false);
            let errMsg = 'Распознавание не сработало.';
            if (!navigator.onLine) errMsg += ' Нет интернета.';
            else errMsg += ' Попробуйте VPN или другой браузер.';
            showFail(btn, hint, errMsg);
        }
    };
    
    try {
        testRec.start();
        log('testRec.start() вызван успешно', 'info');
        
        // 6 секунд на произнесение слова
        testTimer = setTimeout(() => {
            if (!sttOk) {
                log('Таймаут 6с: речь не распознана', 'err');
                testRec.stop();
            }
        }, 6000);
    } catch (e) {
        log(`Исключение при start(): ${e.message}`, 'err');
        setDiag('d-stt', false);
        showFail(btn, hint, `Не удалось запустить STT: ${e.message}`);
    }
}

// Вспомогательные функции диагностики
function setDiag(id, ok) {
    const el = document.getElementById(id);
    el.classList.remove('checking', 'pending');
    el.classList.add(ok ? 'ok' : 'fail');
}
function setChecking(id) {
    const el = document.getElementById(id);
    el.classList.remove('ok', 'fail', 'pending');
    el.classList.add('checking');
}
function showFail(btn, hint, msg) {
    btn.className = 'state-error';
    btn.textContent = 'Попробовать снова';
    btn.disabled = false;
    hint.textContent = msg;
    log(`Диагностика провалена: ${msg}`, 'err');
}

/**
 * ИГРА
 */
function startGame() {
    state.found.clear();
    state.idx = 0;
    
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    
    // Настройка анализатора громкости
    if (state.audioCtx && state.micStream) {
        const source = state.audioCtx.createMediaStreamSource(state.micStream);
        state.analyser = state.audioCtx.createAnalyser();
        state.analyser.fftSize = 256;
        state.analyser.smoothingTimeConstant = 0.3;
        source.connect(state.analyser);
        startVolumeMonitor();
        log('Анализатор громкости запущен', 'ok');
    }
    
    initRecognition();
    showNextColor();
    log('=== ИГРА НАЧАЛАСЬ ===', 'ok');
}

function startVolumeMonitor() {
    const fill = document.getElementById('vol-fill');
    const data = new Uint8Array(state.analyser.frequencyBinCount);
    state.volInterval = setInterval(() => {
        state.analyser.getByteFrequencyData(data);
        let sum = 0;
        for (let i = 0; i < data.length; i++) sum += data[i];
        const avg = sum / data.length;
        fill.style.height = Math.min(100, avg * 2.5) + '%';
    }, 60);
}

function initRecognition() {
    state.recognition = new SR();
    state.recognition.lang = 'ru-RU';
    state.recognition.continuous = true;
    state.recognition.interimResults = true;
    state.recognition.maxAlternatives = 3;

    state.recognition.onstart = () => {
        document.getElementById('mic-icon').classList.add('active');
        log('🎤 Слушаю...', 'stt');
    };

    state.recognition.onresult = (e) => {
        if (state.processing) return;
        
        for (let i = e.resultIndex; i < e.results.length; i++) {
            const res = e.results[i];
            const text = res[0].transcript.toLowerCase().trim();
            const conf = (res[0].confidence * 100).toFixed(0);
            
            if (res.isFinal) {
                log(`Финал: "${text}" (${conf}%)`, 'stt');
                checkAnswer(text);
            } else if (text.length > 1) {
                // Показываем interim только если достаточно длинный
                log(`Промежуточный: "${text}"`, 'info');
            }
        }
    };

    state.recognition.onerror = (e) => {
        log(`Ошибка распознавания: ${e.error}`, 'err');
        if (e.error === 'no-speech' || e.error === 'aborted') {
            // Перезапуск через паузу
            setTimeout(() => {
                try { state.recognition.start(); } catch(ex) {}
            }, 300);
        }
    };
    
    state.recognition.onend = () => {
        document.getElementById('mic-icon').classList.remove('active');
        if (!state.processing) {
            setTimeout(() => {
                try { state.recognition.start(); } catch(ex) { log('Не удалось перезапустить STT', 'err'); }
            }, 200);
        }
    };
    
    try { 
        state.recognition.start(); 
        log('Основной STT запущен', 'ok');
    } catch(e) { 
        log(`Ошибка запуска основного STT: ${e.message}`, 'err'); 
    }
}

function checkAnswer(text) {
    const target = COLORS[state.idx];
    const targetName = target.name.toLowerCase();
    
    // Прямое вхождение
    if (text.includes(targetName)) {
        log(`✅ Совпадение: "${text}" содержит "${targetName}"`, 'ok');
        handleCorrect();
        return;
    }
    
    // Расстояние Левенштейна для опечаток
    const dist = levenshtein(text, targetName);
    if (dist <= 2 && text.length >= 3) {
        log(`✅ Нечёткое совпадение: "${text}" ~ "${targetName}" (dist=${dist})`, 'ok');
        handleCorrect();
        return;
    }
    
    log(`✗ Не подходит: "${text}" (цель: "${targetName}", dist=${dist})`, 'warn');
}

function levenshtein(a, b) {
    const m = a.length, n = b.length;
    const dp = Array.from({length: m+1}, () => Array(n+1).fill(0));
    for (let i = 0; i <= m; i++) dp[i][0] = i;
    for (let j = 0; j <= n; j++) dp[0][j] = j;
    for (let i = 1; i <= m; i++)
        for (let j = 1; j <= n; j++)
            dp[i][j] = a[i-1] === b[j-1] 
                ? dp[i-1][j-1] 
                : 1 + Math.min(dp[i-1][j-1], dp[i][j-1], dp[i-1][j]);
    return dp[m][n];
}

function handleCorrect() {
    state.processing = true;
    const card = document.getElementById('color-card');
    card.classList.add('correct');
    speak(`Молодец! Это ${COLORS[state.idx].name}!`);
    state.found.add(state.idx);
    
    setTimeout(() => {
        card.classList.remove('correct');
        state.processing = false;
        if (state.found.size >= COLORS.length) showWin();
        else showNextColor();
    }, 1600);
}

function showNextColor() {
    const available = COLORS.filter((_, i) => !state.found.has(i));
    const c = available[Math.floor(Math.random() * available.length)];
    state.idx = COLORS.indexOf(c);
    
    document.getElementById('instruction').textContent = 'Какой это цвет?';
    document.getElementById('color-card').style.backgroundColor = c.hex;
    speak('Назови цвет!');
    log(`Новый цвет: ${c.name} (${c.hex})`, 'info');
}

function speak(text) {
    if ('speechSynthesis' in window) {
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'ru-RU'; 
        u.rate = 0.9;
        speechSynthesis.speak(u);
    }
}

function showWin() {
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('win-screen').classList.remove('hidden');
    speak('Поздравляю! Все цвета названы!');
    log('=== ПОБЕДА! ===', 'ok');
    
    for (let i = 0; i < 25; i++) {
        const el = document.createElement('div');
        el.className = 'emoji-rain';
        el.textContent = ['⭐','🎈','🎉','✨'][Math.floor(Math.random()*4)];
        el.style.left = Math.random()*100 + 'vw';
        el.style.top = '-50px';
        el.style.animationDuration = (2 + Math.random()*2) + 's';
        el.style.animationDelay = Math.random() + 's';
        document.body.appendChild(el);
    }
}

// Стартовый лог
log('Приложение загружено. Нажмите "Запустить проверку".', 'info');
log(`User Agent: ${navigator.userAgent.substring(0, 80)}...`, 'info');
log(`Protocol: ${location.protocol}, Secure: ${window.isSecureContext}`, 'info');
</script>
</body>
</html>
