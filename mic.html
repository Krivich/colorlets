<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Назови цвет</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: #f8f9fa; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: hidden; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #start-screen {
            position: absolute; inset: 0; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #f8f9fa; padding: 20px; text-align: center;
        }
        #start-screen h1 { font-size: 2.2rem; margin-bottom: 15px; color: #333; }
        .diag-list { 
            list-style: none; text-align: left; 
            margin: 20px 0; font-size: 1.1rem; line-height: 2.2;
            opacity: 0.3; transition: opacity 0.3s;
        }
        .diag-list.active { opacity: 1; }
        .diag-list li::before { content: '⏳ '; }
        .diag-list li.ok::before { content: '✅ '; }
        .diag-list li.fail::before { content: '❌ '; }
        .diag-list li.warn::before { content: '️ '; }
        .diag-list li.pending { color: #bbb; }
        
        #action-btn {
            padding: 18px 50px; font-size: 1.6rem;
            background: #2196F3; color: white; border: none;
            border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(33,150,243,0.4);
            transition: all 0.3s; min-width: 280px; margin-top: 10px;
        }
        #action-btn:active { transform: scale(0.95); }
        #action-btn.checking { background: #FF9800; cursor: wait; }
        #action-btn.ready { background: #4caf50; animation: pulse-btn 2s infinite; }
        #action-btn.error { background: #f44336; }
        #action-btn.record { background: #e91e63; }
        @keyframes pulse-btn { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        
        .diag-hint { margin-top: 15px; font-size: 0.95rem; color: #666; max-width: 90%; line-height: 1.5; min-height: 40px; }

        #volume-meter {
            width: 200px; height: 10px; background: #ddd;
            border-radius: 5px; margin: 15px auto; overflow: hidden;
            display: none;
        }
        #volume-bar {
            height: 100%; width: 0%; background: #4caf50;
            transition: width 0.1s ease;
        }

        #game-screen { display:none; flex-direction:column; align-items:center; width:100%; padding: 10px; }
        #instruction-text { font-size: 2rem; font-weight: 800; margin-bottom: 20px; text-align: center; min-height: 60px; color: #333; }
        #color-card { width: 70vw; height: 70vw; max-width: 350px; max-height: 350px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: all 0.4s ease; }
        #color-card.correct { animation: success-pop 0.7s ease; box-shadow: 0 0 40px rgba(76,175,80,0.7); }
        @keyframes success-pop { 0%{transform:scale(1)} 40%{transform:scale(1.15) rotate(3deg)} 70%{transform:scale(0.95) rotate(-2deg)} 100%{transform:scale(1) rotate(0)} }
        
        #mic-indicator { margin-top: 20px; width: 60px; height: 60px; border-radius: 50%; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; transition: all 0.3s; }
        #mic-indicator.alive { background: #c8e6c9; animation: mic-alive 1s infinite; }
        #mic-indicator.listening { background: #ffcdd2; animation: mic-listen 1.5s infinite; }
        @keyframes mic-alive { 0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(76,175,80,0.5); } 50% { transform: scale(1.12); box-shadow: 0 0 0 12px rgba(76,175,80,0); } }
        @keyframes mic-listen { 0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244,67,54,0.5); } 50% { transform: scale(1.12); box-shadow: 0 0 0 12px rgba(244,67,54,0); } }
        
        #debug-panel { 
            margin-top: 15px; width: 90%; max-width: 400px; background: #fff;
            border: 1px solid #ddd; border-radius: 10px; padding: 10px;
            font-size: 0.8rem; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            max-height: 250px; overflow-y: auto; font-family: monospace;
            display: flex; flex-direction: column; gap: 5px;
        }
        .debug-line { margin-bottom: 2px; border-bottom: 1px dashed #eee; padding-bottom: 2px; word-break: break-all; }
        .debug-event { color: #2196F3; font-weight: bold; }
        .debug-text { color: #333; }
        .debug-error { color: #f44336; }
        .debug-success { color: #4caf50; font-weight: bold; }
        .debug-info { color: #ff9800; }

        /* Кнопка прослушивания */
        #play-last-btn {
            margin-top: 10px;
            padding: 8px 15px;
            background: #607d8b;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 0.9rem;
            cursor: pointer;
            display: none; /* Скрыта по умолчанию */
            align-self: center;
        }
        #play-last-btn:hover { background: #455a64; }

        #win-screen { display:none; position:absolute; inset:0; z-index:10; flex-direction:column; align-items:center; justify-content:center; background:#f8f9fa; }
        #win-screen h1 { font-size:3rem; color:#4caf50; margin-bottom:10px; }
        #win-screen p { font-size:1.5rem; color:#666; margin-bottom:30px; }
        .emoji-rain { position:fixed; font-size:2.5rem; animation:fall 3s linear forwards; z-index:5; }
        @keyframes fall { to { top:110vh; transform:rotate(360deg); } }
    </style>
</head>
<body>

<div id="start-screen">
    <h1> Назови цвет</h1>
    <ul class="diag-list" id="diag-list">
        <li id="d-api" class="pending">API распознавания речи</li>
        <li id="d-mic" class="pending">Доступ к микрофону</li>
        <li id="d-audio" class="pending">Аудиопоток (звук идёт)</li>
        <li id="d-loop" class="pending">Цифровая петля (Logic)</li>
        <li id="d-rec" class="pending">Тест записи (Mic->Speaker)</li>
    </ul>
    
    <div id="volume-meter"><div id="volume-bar"></div></div>
    
    <button id="action-btn" onclick="runFullDiagnostics()"> Запустить проверку</button>
    <button id="record-btn" style="display:none;" onclick="testRecording()"> 🎙 Записать тест (3 сек)</button>
    
    <div class="diag-hint" id="diag-hint">Нажми "Запустить проверку" для старта.</div>
</div>

<div id="game-screen">
    <div id="instruction-text">Какой это цвет?</div>
    <div id="color-card"></div>
    <div id="mic-indicator">🎤</div>
    
    <!-- ПАНЕЛЬ ОТЛАДКИ -->
    <div id="debug-panel">
        <div class="debug-line debug-event">Ожидание запуска...</div>
    </div>
    <button id="play-last-btn">🔊 Прослушать последнюю посылку STT</button>
</div>

<div id="win-screen">
    <h1>🎉 Молодец!</h1>
    <p>Ты назвала все цвета!</p>
    <button onclick="location.reload()" style="padding:18px 50px;font-size:1.6rem;background:#4caf50;color:white;border:none;border-radius:50px;cursor:pointer;">Ещё раз</button>
</div>

<script>
const COLORS = [
    { name:"Красный",   hex:"#E53935", hint:"как помидорка" },
    { name:"Синий",     hex:"#1E88E5", hint:"как небо" },
    { name:"Зеленый",   hex:"#43A047", hint:"как лягушка" },
    { name:"Желтый",    hex:"#FFD600", hint:"как солнышко" },
    { name:"Оранжевый", hex:"#FB8C00", hint:"как апельсин" },
    { name:"Фиолетовый",hex:"#8E24AA", hint:"как слива" },
    { name:"Черный",    hex:"#263238", hint:"как ночка" },
    { name:"Белый",     hex:"#F5F5F5", hint:"как снежок" },
    { name:"Розовый",   hex:"#EC407A", hint:"как свинка" }
];

let currentIdx = 0, isProcessing = false, found = new Set();
let recognition = null, audioCtx = null, analyser = null, micStream = null;
let aliveCheckInterval = null;
let isRecognizing = false; 
let isSpeaking = false; 

// Для записи последней посылки
let lastAudioBlob = null;
const playBtn = document.getElementById('play-last-btn');

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function logDebug(msg, type='event') {
    const panel = document.getElementById('debug-panel');
    if (!panel) return;
    const line = document.createElement('div');
    line.className = `debug-line debug-${type}`;
    line.textContent = msg;
    panel.appendChild(line);
    panel.scrollTop = panel.scrollHeight;
    while (panel.children.length > 25) panel.removeChild(panel.firstChild);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ==========================================
// АЛГОРИТМ ЛЕВЕНШТЕЙНА И ТРАНСЛИТ
// ==========================================
function levenshtein(a, b) {
    const matrix = [];
    for (let i = 0; i <= b.length; i++) matrix[i] = [i];
    for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
    for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
            if (b.charAt(i - 1) == a.charAt(j - 1)) matrix[i][j] = matrix[i - 1][j - 1];
            else matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
        }
    }
    return matrix[b.length][a.length];
}

const translitMap = {
    'a': 'а', 'b': 'б', 'v': 'в', 'g': 'г', 'd': 'д', 'e': 'е', 'yo': 'ё', 'zh': 'ж', 'z': 'з',
    'i': 'и', 'y': 'й', 'k': 'к', 'l': 'л', 'm': 'м', 'n': 'н', 'o': 'о', 'p': 'п', 'r': 'р',
    's': 'с', 't': 'т', 'u': 'у', 'f': 'ф', 'kh': 'х', 'ts': 'ц', 'ch': 'ч', 'sh': 'ш', 'shch': 'щ',
    '"': 'ъ', 'y\'': 'ы', '`': 'ь', 'yu': 'ю', 'ya': 'я', 'j': 'й', 'w': 'в', 'q': 'к', 'x': 'кс'
};

function transliterate(text) {
    let result = text.toLowerCase();
    ['shch', 'sh', 'ch', 'ts', 'kh', 'yu', 'ya', 'yo', 'zh', 'y\''].forEach(seq => {
        result = result.replace(new RegExp(seq, 'g'), translitMap[seq]);
    });
    for (let eng in translitMap) {
        if (eng.length === 1) result = result.replace(new RegExp(eng, 'g'), translitMap[eng]);
    }
    return result.replace(/[^а-яё]/g, '');
}

function findBestMatchInStream(rawPhrase, targetColorName) {
    const stream = transliterate(rawPhrase);
    if (!stream) return { distance: Infinity, fragment: "" };
    const target = targetColorName.toLowerCase();
    let bestDist = Infinity, bestFragment = "";
    const minWin = Math.max(2, target.length - 2);
    const maxWin = target.length + 3;
    for (let winSize = minWin; winSize <= maxWin; winSize++) {
        for (let i = 0; i <= stream.length - winSize; i++) {
            const fragment = stream.substr(i, winSize);
            const dist = levenshtein(fragment, target);
            if (dist < bestDist) { bestDist = dist; bestFragment = fragment; }
        }
    }
    return { distance: bestDist, fragment: bestFragment, fullStream: stream };
}

// ==========================================
// ДИАГНОСТИКА
// ==========================================
async function runFullDiagnostics() {
    const btn = document.getElementById('action-btn');
    const recBtn = document.getElementById('record-btn');
    const hint = document.getElementById('diag-hint');
    const list = document.getElementById('diag-list');
    
    btn.classList.add('checking'); btn.textContent = 'Проверяю...'; btn.disabled = true; list.classList.add('active');
    logDebug("Запуск проверки...", "event");
    let passed = 0;
    
    function mark(id, status) { 
        const el = document.getElementById(id); if(el) el.className = status; 
        if (status === 'ok') passed++; 
    }

    // 1. API
    if (!SpeechRecognition) { mark('d-api', 'fail'); finishDiag(0, 'Нужен Chrome/Edge.'); return; }
    mark('d-api', 'ok'); logDebug("API OK", "success"); await sleep(200);

    // 2. Микрофон
    try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mark('d-mic', 'ok'); logDebug("Микрофон доступен", "success");
    } catch (e) {
        mark('d-mic', 'fail'); logDebug("Нет доступа к микрофону", "error");
        finishDiag(passed, 'Разрешите доступ к микрофону.'); return;
    }
    await sleep(200);

    // 3. Аудиопоток
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        const source = audioCtx.createMediaStreamSource(micStream);
        analyser = audioCtx.createAnalyser(); analyser.fftSize = 256; source.connect(analyser);
        mark('d-audio', 'ok'); logDebug("Аудио контекст OK", "success");
    } catch(e) { mark('d-audio', 'warn'); }
    await sleep(500);

    // 4. ЦИФРОВАЯ ПЕТЛЯ
    logDebug("Тест цифровой петли...", "info");
    mark('d-loop', 'pending');
    const testTarget = COLORS[0];
    const simulatedPhrases = ["красный", "касный", "krasny"];
    let loopSuccess = false;
    for (const phrase of simulatedPhrases) {
        const match = findBestMatchInStream(phrase, testTarget.name);
        const threshold = Math.max(2, Math.floor(testTarget.name.length / 2));
        if (match.distance <= threshold) { loopSuccess = true; break; }
    }
    if (loopSuccess) { mark('d-loop', 'ok'); logDebug("Логика OK", "success"); }
    else { mark('d-loop', 'fail'); logDebug("Ошибка логики", "error"); }

    // 5. ТЕСТ ЗАПИСИ
    mark('d-rec', 'pending');
    hint.textContent = "Проверка пройдена. Теперь проверим микрофон.";
    btn.style.display = 'none';
    recBtn.style.display = 'block';
}

function testRecording() {
    const recBtn = document.getElementById('record-btn');
    const meter = document.getElementById('volume-meter');
    const bar = document.getElementById('volume-bar');
    const hint = document.getElementById('diag-hint');
    
    recBtn.disabled = true;
    recBtn.textContent = "Запись...";
    meter.style.display = 'block';
    hint.textContent = "Говори сейчас! (3 секунды)";
    logDebug("Начало записи...", "event");

    const mediaRecorder = new MediaRecorder(micStream);
    const chunks = [];

    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    
    mediaRecorder.onstop = async () => {
        const blob = new Blob(chunks, { 'type' : 'audio/ogg; codecs=opus' });
        const audioURL = window.URL.createObjectURL(blob);
        const audio = new Audio(audioURL);
        
        recBtn.style.display = 'none';
        meter.style.display = 'none';
        hint.textContent = "Воспроизведение записи...";
        logDebug("Воспроизведение...", "event");
        
        document.getElementById('d-rec').className = 'ok';
        
        audio.play();
        audio.onended = () => {
            hint.textContent = "Если ты слышал свой голос четко - жми Играть!";
            const playBtnGame = document.createElement('button');
            playBtnGame.id = 'action-btn';
            playBtnGame.className = 'ready';
            playBtnGame.textContent = '▶ Играть';
            playBtnGame.onclick = startGame;
            document.getElementById('start-screen').appendChild(playBtnGame);
        };
    };

    mediaRecorder.start();
    
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    const volInterval = setInterval(() => {
        analyser.getByteFrequencyData(dataArray);
        const avg = dataArray.reduce((a,b)=>a+b,0)/dataArray.length;
        bar.style.width = Math.min(100, avg * 2) + '%';
    }, 50);

    setTimeout(() => {
        mediaRecorder.stop();
        clearInterval(volInterval);
    }, 3000);
}

function finishDiag(passed, msg) {
    const btn = document.getElementById('action-btn');
    const hint = document.getElementById('diag-hint');
    btn.disabled = false; btn.classList.remove('checking');
    if (passed < 4) {
        btn.textContent = '🔄 Снова'; btn.classList.add('error'); btn.onclick = () => location.reload();
        hint.textContent = msg;
    }
}

// ==========================================
// ИГРА
// ==========================================
function startAliveMonitor() {
    const mic = document.getElementById('mic-indicator');
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    aliveCheckInterval = setInterval(() => {
        if (!analyser || isSpeaking) return;
        analyser.getByteFrequencyData(dataArray);
        const avg = dataArray.reduce((a,b) => a+b, 0) / dataArray.length;
        if (avg > 8 && !isProcessing) { mic.classList.add('alive'); mic.classList.remove('listening'); }
        else { mic.classList.remove('alive'); }
    }, 100);
}
function stopAliveMonitor() { clearInterval(aliveCheckInterval); document.getElementById('mic-indicator').classList.remove('alive', 'listening'); }

function startGame() {
    found.clear(); currentIdx = 0;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    
    // Настраиваем кнопку прослушивания
    playBtn.onclick = () => {
        if (lastAudioBlob) {
            const url = URL.createObjectURL(lastAudioBlob);
            const audio = new Audio(url);
            logDebug("Воспроизведение последней посылки...", "info");
            audio.play();
        } else {
            logDebug("Нет сохраненной записи.", "error");
        }
    };

    initRecognition(); startAliveMonitor(); showNextColor();
}

function initRecognition() {
    recognition = new SpeechRecognition();
    recognition.lang = 'ru-RU';
    recognition.continuous = true; 
    recognition.interimResults = true; 
    recognition.maxAlternatives = 5;

    // ВАЖНО: Мы не можем получить прямой доступ к аудио-потоку Web Speech API.
    // Но мы можем имитировать запись того, что "видит" пользователь, используя наш микрофон.
    // Для этого мы будем писать звук параллельно с распознаванием.
    
    let mediaRecorder = null;
    let recordedChunks = [];

    recognition.onstart = () => {
        isRecognizing = true;
        if (isSpeaking) { try { recognition.stop(); } catch(e){} return; }
        document.getElementById('mic-indicator').classList.add('listening');
        logDebug(">>> Слушаю...", "event");
        
        // Запускаем параллельную запись для отладки
        try {
            mediaRecorder = new MediaRecorder(micStream);
            recordedChunks = [];
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                lastAudioBlob = new Blob(recordedChunks, { 'type' : 'audio/ogg; codecs=opus' });
                playBtn.style.display = 'block'; // Показываем кнопку
                logDebug("Запись посылки завершена. Кнопка активна.", "info");
            };
            mediaRecorder.start();
        } catch(e) {
            logDebug("Не удалось запустить параллельную запись: " + e.message, "error");
        }
    };

    recognition.onresult = (e) => {
        if (isSpeaking || isProcessing) return;
        const last = e.results[e.results.length - 1];
        const transcript = last[0].transcript.toLowerCase().trim();
        logDebug(last.isFinal ? `[FINAL] "${transcript}"` : `[interim] "${transcript}"`, "text");

        if (last.isFinal || transcript.length > 3) {
             const targetColor = COLORS[currentIdx];
             const match = findBestMatchInStream(transcript, targetColor.name);
             const threshold = Math.max(2, Math.floor(targetColor.name.length / 2));
             
             if (match.distance <= threshold) {
                 logDebug(`СОВПАДЕНИЕ: "${match.fragment}"`, "success");
                 try { recognition.stop(); } catch(e){} 
                 if(mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
                 analyzeAnswer(transcript);
                 return;
             }
        }
    };

    recognition.onerror = (e) => {
        isRecognizing = false;
        logDebug(`Ошибка: ${e.error}`, "error");
        if(mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
        setTimeout(restartListening, 1000);
    };
    
    recognition.onend = () => {
        isRecognizing = false;
        document.getElementById('mic-indicator').classList.remove('listening');
        if(mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
        
        if (!isProcessing && !isSpeaking && document.getElementById('game-screen').style.display === 'flex') {
            setTimeout(restartListening, 500);
        }
    };
    try { recognition.start(); } catch(e) {}
}

function restartListening() {
    if (isRecognizing || isSpeaking || isProcessing) return;
    if (document.getElementById('game-screen').style.display === 'none') return;
    try { recognition.start(); } catch(e) {
        setTimeout(() => { if (!isRecognizing && !isSpeaking) try { recognition.start(); } catch(err) {} }, 1500);
    }
}

function analyzeAnswer(text) {
    const targetColor = COLORS[currentIdx];
    const match = findBestMatchInStream(text, targetColor.name);
    if (match.distance === Infinity) { speak("Не расслышала."); return; }
    const threshold = Math.max(2, Math.floor(targetColor.name.length / 2));

    if (match.distance <= threshold) { handleCorrect(); }
    else {
        let closestOtherColor = null, minOtherDist = Infinity;
        COLORS.forEach(c => {
            if (c.name !== targetColor.name) {
                const m = findBestMatchInStream(text, c.name);
                if (m.distance < minOtherDist) { minOtherDist = m.distance; closestOtherColor = c; }
            }
        });
        if (closestOtherColor && minOtherDist <= threshold) { speak(`Это ${closestOtherColor.name}. А нужен ${targetColor.name}.`); }
        else { speak("Попробуй ещё раз!"); }
    }
}

function handleCorrect() {
    isProcessing = true; stopAliveMonitor();
    document.getElementById('mic-indicator').classList.remove('listening');
    document.getElementById('color-card').classList.add('correct');
    logDebug("ПОБЕДА!", "success");
    speak(`Молодец! Это ${COLORS[currentIdx].name}!`);
    found.add(currentIdx);
    setTimeout(() => {
        document.getElementById('color-card').classList.remove('correct');
        if (found.size >= COLORS.length) { showWin(); }
        else { showNextColor(); startAliveMonitor(); }
        isProcessing = false; restartListening();
    }, 1500);
}

function showNextColor() {
    const available = [];
    COLORS.forEach((_, i) => { if (!found.has(i)) available.push(i); });
    currentIdx = available[Math.floor(Math.random() * available.length)];
    const c = COLORS[currentIdx];
    document.getElementById('instruction-text').textContent = "Какой это цвет?";
    document.getElementById('color-card').style.backgroundColor = c.hex;
    logDebug(`Цель: ${c.name}`, "event");
    speak("Назови цвет!");
}

function speak(text) {
    if (!('speechSynthesis' in window)) return;
    isSpeaking = true;
    if (recognition && isRecognizing) { try { recognition.stop(); } catch(e){} }
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ru-RU'; u.rate = 0.85; u.pitch = 1.1;
    u.onend = () => { isSpeaking = false; setTimeout(() => { if (!isProcessing) restartListening(); }, 500); };
    speechSynthesis.speak(u);
}

function showWin() {
    stopAliveMonitor();
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('win-screen').style.display = 'flex';
    speak('Поздравляю!');
    const emojis = ['⭐','🎈','','','','💖'];
    for (let i = 0; i < 30; i++) {
        setTimeout(() => {
            const el = document.createElement('div');
            el.className = 'emoji-rain';
            el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
            el.style.left = Math.random()*100+'vw'; el.style.top = '-60px';
            el.style.animationDuration = (2+Math.random()*2)+'s';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }, i*150);
    }
}
</script>
