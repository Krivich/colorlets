<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Назови цвет</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f8f9fa; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        #start-screen { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f8f9fa; padding: 20px; text-align: center; }
        #start-screen h1 { font-size: 2.2rem; margin-bottom: 15px; color: #333; }
        
        .diag-list { list-style: none; text-align: left; margin: 20px 0; font-size: 1.1rem; line-height: 2.2; opacity: 0.3; transition: opacity 0.3s; }
        .diag-list.active { opacity: 1; }
        .diag-list li::before { content: '⏳ '; }
        .diag-list li.ok::before { content: '✅ '; }
        .diag-list li.fail::before { content: '❌ '; }
        .diag-list li.pending { color: #bbb; }
        
        #action-btn { padding: 18px 50px; font-size: 1.6rem; background: #2196F3; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(33,150,243,0.4); transition: all 0.3s; min-width: 280px; margin-top: 10px; }
        #action-btn:active { transform: scale(0.95); }
        #action-btn.checking { background: #FF9800; cursor: wait; }
        #action-btn.ready { background: #4caf50; animation: pulse-btn 2s infinite; }
        @keyframes pulse-btn { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        
        .diag-hint { margin-top: 15px; font-size: 0.95rem; color: #666; max-width: 90%; line-height: 1.5; min-height: 40px; }

        #game-screen { display:none; flex-direction:column; align-items:center; width:100%; padding: 10px; }
        #instruction-text { font-size: 2rem; font-weight: 800; margin-bottom: 20px; text-align: center; min-height: 60px; color: #333; }
        #color-card { width: 70vw; height: 70vw; max-width: 350px; max-height: 350px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: all 0.4s ease; }
        #color-card.correct { animation: success-pop 0.7s ease; box-shadow: 0 0 40px rgba(76,175,80,0.7); }
        @keyframes success-pop { 0%{transform:scale(1)} 40%{transform:scale(1.15) rotate(3deg)} 70%{transform:scale(0.95) rotate(-2deg)} 100%{transform:scale(1) rotate(0)} }
        
        /* Два индикатора */
        .indicators-row { display: flex; gap: 20px; margin-top: 20px; align-items: center; }
        .mic-circle { width: 60px; height: 60px; border-radius: 50%; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; transition: all 0.3s; }
        .mic-circle.listening { background: #ffcdd2; animation: mic-pulse 1.5s infinite; }
        @keyframes mic-pulse { 0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244,67,54,0.5); } 50% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(244,67,54,0); } }
        
        .volume-bar-container { width: 10px; height: 60px; background: #ddd; border-radius: 5px; overflow: hidden; position: relative; }
        .volume-fill { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: #4caf50; transition: height 0.1s ease; }

        #debug-panel { margin-top: 15px; width: 90%; max-width: 400px; background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 10px; font-size: 0.8rem; text-align: left; box-shadow: 0 2px 5px rgba(0,0,0,0.05); max-height: 150px; overflow-y: auto; font-family: monospace; }
        .debug-line { margin-bottom: 2px; border-bottom: 1px dashed #eee; padding-bottom: 2px; word-break: break-all; }
        .debug-event { color: #2196F3; font-weight: bold; }
        .debug-text { color: #333; }
        .debug-error { color: #f44336; }
        .debug-success { color: #4caf50; font-weight: bold; }

        #win-screen { display:none; position:absolute; inset:0; z-index:10; flex-direction:column; align-items:center; justify-content:center; background:#f8f9fa; }
        #win-screen h1 { font-size:3rem; color:#4caf50; margin-bottom:10px; }
        .emoji-rain { position:fixed; font-size:2.5rem; animation:fall 3s linear forwards; z-index:5; }
        @keyframes fall { to { top:110vh; transform:rotate(360deg); } }
    </style>
</head>
<body>

<div id="start-screen">
    <h1> Назови цвет</h1>
    <ul class="diag-list" id="diag-list">
        <li id="d-api" class="pending">API распознавания</li>
        <li id="d-mic" class="pending">Микрофон</li>
        <li id="d-net" class="pending">Связь с Google (STT)</li>
    </ul>
    <button id="action-btn" onclick="runDiagnostics()"> Запустить проверку</button>
    <div class="diag-hint" id="diag-hint">Проверим всё перед игрой.</div>
</div>

<div id="game-screen">
    <div id="instruction-text">Какой это цвет?</div>
    <div id="color-card"></div>
    
    <div class="indicators-row">
        <div class="volume-bar-container"><div class="volume-fill" id="vol-fill"></div></div>
        <div class="mic-circle" id="mic-icon">🎤</div>
    </div>

    <div id="debug-panel"><div class="debug-line debug-event">Ожидание...</div></div>
</div>

<div id="win-screen">
    <h1>🎉 Молодец!</h1>
    <p>Ты назвала все цвета!</p>
    <button onclick="location.reload()" style="padding:18px 50px;font-size:1.6rem;background:#4caf50;color:white;border:none;border-radius:50px;cursor:pointer;">Ещё раз</button>
</div>

<script>
const COLORS = [
    { name:"Красный", hex:"#E53935", hint:"как помидор" },
    { name:"Синий", hex:"#1E88E5", hint:"как небо" },
    { name:"Зеленый", hex:"#43A047", hint:"как лягушка" },
    { name:"Желтый", hex:"#FFD600", hint:"как солнце" },
    { name:"Оранжевый", hex:"#FB8C00", hint:"как апельсин" },
    { name:"Фиолетовый", hex:"#8E24AA", hint:"как слива" },
    { name:"Черный", hex:"#263238", hint:"как ночь" },
    { name:"Белый", hex:"#F5F5F5", hint:"как снег" },
    { name:"Розовый", hex:"#EC407A", hint:"как свинка" }
];

let currentIdx = 0, isProcessing = false, found = new Set();
let recognition = null, audioCtx = null, analyser = null, micStream = null;
let volInterval = null;
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function logDebug(msg, type='event') {
    const panel = document.getElementById('debug-panel');
    if (!panel) return;
    const line = document.createElement('div');
    line.className = `debug-line debug-${type}`;
    line.textContent = msg;
    panel.appendChild(line);
    panel.scrollTop = panel.scrollHeight;
}

// ==========================================
// ДИАГНОСТИКА
// ==========================================
async function runDiagnostics() {
    const btn = document.getElementById('action-btn');
    const hint = document.getElementById('diag-hint');
    const list = document.getElementById('diag-list');
    
    btn.classList.add('checking'); btn.textContent = 'Проверяю...'; btn.disabled = true; list.classList.add('active');
    
    // 1. API
    if (!SpeechRecognition) { document.getElementById('d-api').className = 'fail'; hint.textContent = 'Нужен Chrome.'; return; }
    document.getElementById('d-api').className = 'ok';
    
    // 2. Микрофон
    try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        document.getElementById('d-mic').className = 'ok';
        logDebug("Микрофон OK", "success");
    } catch (e) {
        document.getElementById('d-mic').className = 'fail';
        hint.textContent = 'Нет доступа к микрофону.'; return;
    }

    // 3. ТЕСТ STT (Самый важный)
    document.getElementById('d-net').className = 'pending';
    hint.textContent = "Проверяю связь с Google STT...";
    
    const testRec = new SpeechRecognition();
    testRec.lang = 'ru-RU';
    testRec.interimResults = false;
    
    let sttWorked = false;
    
    testRec.onresult = () => { sttWorked = true; };
    testRec.onerror = (e) => { logDebug(`Ошибка STT: ${e.error}`, "error"); };
    testRec.onend = () => {
        if (sttWorked) {
            document.getElementById('d-net').className = 'ok';
            logDebug("STT работает!", "success");
            startGame();
        } else {
            document.getElementById('d-net').className = 'fail';
            hint.textContent = "STT не вернул результат. Проверьте интернет/VPN.";
            btn.style.display = 'block'; btn.textContent = 'Попробовать снова'; btn.disabled = false; btn.classList.remove('checking');
        }
    };
    
    try { 
        testRec.start(); 
        // Имитируем тишину, чтобы onend сработал быстрее, если нет голоса
        setTimeout(() => { if(!sttWorked) testRec.stop(); }, 2000);
    } catch(e) { 
        document.getElementById('d-net').className = 'fail'; 
        hint.textContent = "Не удалось запустить STT."; 
    }
}

// ==========================================
// ИГРА
// ==========================================
function startGame() {
    found.clear(); currentIdx = 0;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    
    // Пересоздаем AudioContext для чистоты
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(micStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    
    startVolumeMonitor();
    initRecognition();
    showNextColor();
}

function startVolumeMonitor() {
    const fill = document.getElementById('vol-fill');
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    volInterval = setInterval(() => {
        analyser.getByteFrequencyData(dataArray);
        const avg = dataArray.reduce((a,b)=>a+b,0)/dataArray.length;
        fill.style.height = Math.min(100, avg * 2) + '%';
    }, 50);
}

function initRecognition() {
    recognition = new SpeechRecognition();
    recognition.lang = 'ru-RU';
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onstart = () => {
        document.getElementById('mic-icon').classList.add('listening');
        logDebug("Слушаю...", "event");
    };

    recognition.onresult = (e) => {
        if (isProcessing) return;
        const last = e.results[e.results.length - 1];
        const transcript = last[0].transcript.toLowerCase().trim();
        
        if (last.isFinal || transcript.length > 2) {
            logDebug(`Услышала: "${transcript}"`, "text");
            checkAnswer(transcript);
        }
    };

    recognition.onerror = (e) => {
        logDebug(`Ошибка: ${e.error}`, "error");
        // При ошибке no-speech просто рестартуем
        if (e.error === 'no-speech') setTimeout(() => recognition.start(), 500);
    };
    
    recognition.onend = () => {
        document.getElementById('mic-icon').classList.remove('listening');
        if (!isProcessing) setTimeout(() => recognition.start(), 500);
    };
    
    try { recognition.start(); } catch(e) {}
}

function checkAnswer(text) {
    const target = COLORS[currentIdx];
    // Простая проверка: содержит ли слово целевой цвет или его часть
    // Для надежности используем нашу функцию нечеткого поиска, но упрощенно
    if (text.includes(target.name.toLowerCase()) || levenshtein(text, target.name.toLowerCase()) <= 2) {
        handleCorrect();
    }
}

function levenshtein(a, b) {
    const matrix = [];
    for (let i = 0; i <= b.length; i++) matrix[i] = [i];
    for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
    for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
            if (b.charAt(i - 1) == a.charAt(j - 1)) matrix[i][j] = matrix[i - 1][j - 1];
            else matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
        }
    }
    return matrix[b.length][a.length];
}

function handleCorrect() {
    isProcessing = true;
    document.getElementById('color-card').classList.add('correct');
    speak(`Молодец! Это ${COLORS[currentIdx].name}!`);
    found.add(currentIdx);
    
    setTimeout(() => {
        document.getElementById('color-card').classList.remove('correct');
        isProcessing = false;
        if (found.size >= COLORS.length) showWin();
        else showNextColor();
    }, 1500);
}

function showNextColor() {
    const available = COLORS.filter((_, i) => !found.has(i));
    const c = available[Math.floor(Math.random() * available.length)];
    currentIdx = COLORS.indexOf(c);
    
    document.getElementById('instruction-text').textContent = "Какой это цвет?";
    document.getElementById('color-card').style.backgroundColor = c.hex;
    speak("Назови цвет!");
}

function speak(text) {
    if ('speechSynthesis' in window) {
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'ru-RU'; u.rate = 0.9;
        speechSynthesis.speak(u);
    }
}

function showWin() {
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('win-screen').style.display = 'flex';
    speak('Поздравляю!');
    for(let i=0; i<20; i++) {
        const el = document.createElement('div');
        el.className = 'emoji-rain';
        el.textContent = ['⭐','🎈',''][Math.floor(Math.random()*3)];
        el.style.left = Math.random()*100+'vw'; el.style.top = '-50px';
        el.style.animationDuration = (2+Math.random()*2)+'s';
        document.body.appendChild(el);
    }
}
</script>
</body>
</html>
