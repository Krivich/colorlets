<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Цветашки (Colorlets)</title>
    <style>
        :root {
            --bg: #f8f9fa; --text: #212529; --shadow: 0 4px 10px rgba(0,0,0,0.12);
            --correct: #4caf50; --wrong: #f44336;
        }
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            user-select: none; touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.3s ease;
        }
        .hidden { display: none !important; }
        h1 { color: var(--text); margin: 0 0 10px; text-align: center; font-size: 2rem; }
        p { color: #555; margin: 0 0 20px; text-align: center; max-width: 80%; }
        button {
            padding: 14px 36px; font-size: 1.4rem;
            background: #2563eb; color: white; border: none;
            border-radius: 50px; cursor: pointer; box-shadow: 0 4px 12px rgba(37,99,235,0.3);
            transition: transform 0.1s; -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.95); }

        #task-text {
            font-size: 2.2rem; font-weight: 700; margin-bottom: 20px;
            text-align: center; min-height: 56px; transition: color 0.2s;
            animation: gentle-pulse 2.5s infinite ease-in-out;
        }
        @keyframes gentle-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }

        .grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 16px; width: 85vw; max-width: 360px; aspect-ratio: 1/1;
        }
        .card {
            background: #fff; border-radius: 20px; box-shadow: var(--shadow);
            cursor: pointer; border: 4px solid transparent;
            transition: transform 0.12s; -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }
        .card:active { transform: scale(0.93); }
        @keyframes shake { 0%{transform:translateX(0)} 25%{transform:translateX(-8px)} 50%{transform:translateX(8px)} 75%{transform:translateX(-8px)} 100%{transform:translateX(0)} }
        @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} }
        .wrong { animation: shake 0.4s ease; border-color: var(--wrong); }
        .correct { animation: pop 0.4s ease; border-color: var(--correct); }

        .progress-dots { display: flex; gap: 8px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
        .dot { width: 18px; height: 18px; border-radius: 50%; background: #e2e8f0; border: 2px solid #cbd5e1; transition: all 0.3s ease; }
        .dot.found { transform: scale(1.15); border-color: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }

        #win-screen h1 { color: #16a34a; font-size: 2.5rem; }
        .confetti { font-size: 3.5rem; margin: 15px; }
        .subtext { font-size: 0.95rem; color: #777; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen">
        <h1>🎨 Цветашки</h1>
        <p>Нажми кнопку, чтобы начать игру.</p>
        <button onclick="startGame()">Играть</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <div id="task-text">Выбери цвет...</div>
        <div class="grid" id="grid"></div>
        <div class="progress-dots" id="dots"></div>
        <div class="subtext" id="progress-label">Найдено: 0 / 0</div>
    </div>

    <div id="win-screen" class="screen hidden">
        <div class="confetti">🎉 ⭐ 🏆</div>
        <h1>Молодец!</h1>
        <p>Ты нашла все цвета!</p>
        <br>
        <button onclick="location.reload()">Ещё раз</button>
    </div>

    <script>
        const CONFIG = [
            { name: "Красный",   hex: "#E53935", hints: ["как помидор", "как клубничка", "как божья коровка"] },
            { name: "Синий",     hex: "#1E88E5", hints: ["как небо", "как море", "как ручеёк"] },
            { name: "Зеленый",   hex: "#43A047", hints: ["как травка", "как ёлочка", "как лягушка"] },
            { name: "Желтый",    hex: "#FFD600", hints: ["как солнышко", "как цыплёнок", "как банан"] },
            { name: "Оранжевый", hex: "#FB8C00", hints: ["как апельсин", "как морковка", "как лисичка"] },
            { name: "Фиолетовый",hex: "#8E24AA", hints: ["как виноград", "как слива", "как фиалка"] },
            { name: "Черный",    hex: "#263238", hints: ["как ночка", "как жучок", "как шляпка"] },
            { name: "Белый",     hex: "#F5F5F5", hints: ["как снежок", "как молочко", "как зайчик"] },
            { name: "Розовый",   hex: "#EC407A", hints: ["как свинка", "как цветочек", "как фламинго"] }
        ];

        let target = null, isProcessing = false, found = new Set(), timer = null, stateTimer = null;
        let synth = window.speechSynthesis, voice = null;

        // 🔐 Надёжный блокировщик состояния
        function lock(duration, onUnlock) {
            unlock();
            isProcessing = true;
            stateTimer = setTimeout(() => {
                isProcessing = false;
                if (onUnlock) onUnlock();
            }, duration);
        }

        function unlock() {
            if (stateTimer) clearTimeout(stateTimer);
            stateTimer = null;
            isProcessing = false;
        }

        function initVoice() {
            const v = synth.getVoices();
            voice = v.find(x => x.lang.includes('ru')) || v[0];
        }
        if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = initVoice;

        // 🔊 Безопасная обёртка для TTS (не ломает игру, если голос зависнет)
        function speak(text) {
            try {
                if (synth.speaking) synth.cancel();
                const u = new SpeechSynthesisUtterance(text);
                if (voice) u.voice = voice;
                u.lang = 'ru-RU'; u.rate = 0.85; u.pitch = 1.1;
                synth.speak(u);
            } catch (e) { console.warn('TTS error:', e); }
        }

        function startRepeat() {
            stopRepeat();
            timer = setInterval(() => {
                if (!isProcessing && target) speak("Выбери " + target.name);
            }, 6000);
        }
        function stopRepeat() { clearInterval(timer); }

        function shuffle(a) {
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function startGame() {
            initVoice(); found.clear();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            buildDots(); nextRound();
        }

        function buildDots() {
            const box = document.getElementById('dots'); box.innerHTML = '';
            CONFIG.forEach(c => {
                const d = document.createElement('div');
                d.className = 'dot'; d.style.backgroundColor = c.hex;
                if (c.name === 'Белый') d.style.border = '2px solid #ccc';
                box.appendChild(d);
            });
        }

        function updateProgress() {
            const dots = document.querySelectorAll('.dot');
            CONFIG.forEach((c, i) => dots[i].classList.toggle('found', found.has(c.name)));
            document.getElementById('progress-label').innerText = `Найдено: ${found.size} / ${CONFIG.length}`;
        }

        function nextRound() {
            unlock(); stopRepeat();
            if (found.size === CONFIG.length) { showWin(); return; }

            const pool = shuffle([...CONFIG]).slice(0, 4);
            target = pool[Math.floor(Math.random() * pool.length)];
            renderGrid(pool);

            setTimeout(() => {
                const phrases = ["Выбери " + target.name, "Где " + target.name + "?", "Покажи " + target.name];
                const txt = phrases[Math.floor(Math.random() * phrases.length)];
                const el = document.getElementById('task-text');
                el.innerText = txt;
                el.style.color = ['Белый','Желтый','Розовый'].includes(target.name) ? '#212529' : target.hex;
                speak(txt);
                startRepeat();
            }, 300);
        }

        function renderGrid(colors) {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            shuffle([...colors]).forEach(c => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.backgroundColor = c.hex;
                if (c.name === 'Белый') card.style.border = '2px solid #ddd';
                card.onclick = (e) => { e.preventDefault(); tap(card, c); };
                grid.appendChild(card);
            });
        }

        function tap(card, clicked) {
            if (isProcessing) return;
            stopRepeat();

            if (clicked.name === target.name) {
                card.classList.add('correct');
                if (!found.has(clicked.name)) {
                    found.add(clicked.name);
                    updateProgress();
                }
                speak(["Молодец!", "Правильно!", "Умница!", "Супер!"][Math.floor(Math.random()*4)]);
                // Блокируем на 800мс, потом запускаем следующий раунд
                lock(800, () => nextRound());
            } else {
                card.classList.add('wrong');
                setTimeout(() => card.classList.remove('wrong'), 400);
                const h1 = clicked.hints[Math.floor(Math.random()*clicked.hints.length)];
                const h2 = target.hints[Math.floor(Math.random()*target.hints.length)];
                speak(`Это ${clicked.name}, ${h1}. А нам нужен ${target.name}, ${h2}.`);
                // Блокируем на 600мс, потом возобновляем повтор задания
                lock(600, startRepeat);
            }
        }

        function showWin() {
            unlock(); stopRepeat();
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('win-screen').classList.remove('hidden');
            speak("Поздравляю! Ты нашла все цвета!");
            
            const emojis = ['⭐','🎈','🎉','🍭','🌈'];
            setInterval(() => {
                const el = document.createElement('div');
                el.innerText = emojis[Math.floor(Math.random()*emojis.length)];
                el.style.cssText = `position:fixed;left:${Math.random()*100}vw;top:-50px;font-size:2rem;transition:top 3s linear;z-index:-1;`;
                document.body.appendChild(el);
                setTimeout(() => el.style.top = '110vh', 100);
                setTimeout(() => el.remove(), 3100);
            }, 300);
        }
    </script>
</body>
</html>
